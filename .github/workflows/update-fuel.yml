name: Aktualizace cen paliv (CSU)

on:
  schedule:
    - cron: '0 6 * * 3'   # kazdou stredu 06:00 UTC (08:00 letniho casu CZ)
  workflow_dispatch: {}    # + rucni spusteni tlacitkem v zalozce Actions
  push:
    paths:
      - 'update_fuel.py'   # prvni test se spusti hned po nahrani skriptu

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Stazeni cen z CSU a aktualizace live.json
        run: python update_fuel.py

      - name: Commit a push zmen
        run: |
          git config user.name "okolnik-bot"
          git config user.email "actions@users.noreply.github.com"
          git add live.json
          git diff --cached --quiet || git commit -m "Automaticka aktualizace cen paliv (CSU)"
          git push
